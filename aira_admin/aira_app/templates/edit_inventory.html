{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Inventory Item - AIRA</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a2a6c, #691212, #88280b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            padding: 30px 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 720px;
            margin: auto;
        }

        .page-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.15);
            position: relative;
        }

        .page-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #FF416C, #FF4B2B);
            border-radius: 20px 20px 0 0;
        }

        h2 {
            color: #fff;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
            font-weight: 600;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .form-row {
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #fff;
            font-weight: 600;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.15);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input::placeholder,
        textarea::placeholder {
            color: rgba(255,255,255,0.6);
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #FF4B2B;
            background: rgba(255,255,255,0.25);
            box-shadow: 0 0 0 3px rgba(255,75,43,0.35);
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        /* ===============================
           FIX FOR SELECT DROPDOWN ISSUE
           =============================== */
        select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
        }

        select option {
            background-color: #6b2a2a; /* dark maroon */
            color: #ffffff;
        }

        select option:hover,
        select option:checked {
            background-color: #FF4B2B;
            color: #ffffff;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 35px;
            justify-content: center;
        }

        .btn-primary {
            padding: 14px 32px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(45deg, #FF416C, #FF4B2B);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 18px rgba(255,75,43,0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255,75,43,0.6);
        }

        .back-link {
            padding: 14px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            color: #fff;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-3px);
        }

        @media (max-width: 600px) {
            .page-card {
                padding: 30px 20px;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn-primary,
            .back-link {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>

<body>
<div class="container">
    <div class="page-card">
        <h2>Edit Inventory Item</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="form-row">
                <label for="name">Item Name</label>
                <input type="text" id="name" name="name" value="{{ item.name }}" required>
            </div>

            <div class="form-row">
                <label for="category">Category</label>
                <select id="category" name="category">
                    <option value="STATIONERY" {% if item.category == "STATIONERY" %}selected{% endif %}>Stationery</option>
                    <option value="ELECTRONICS" {% if item.category == "ELECTRONICS" %}selected{% endif %}>Electronics</option>
                    <option value="LAB" {% if item.category == "LAB" %}selected{% endif %}>Lab Equipment</option>
                    <option value="FURNITURE" {% if item.category == "FURNITURE" %}selected{% endif %}>Furniture</option>
                    <option value="OTHER" {% if item.category == "OTHER" %}selected{% endif %}>Other</option>
                </select>
            </div>

            <div class="form-row">
                <label for="quantity">Quantity</label>
                <input type="number" id="quantity" name="quantity" min="0" value="{{ item.quantity }}">
            </div>

            <div class="form-row">
                <label for="location">Location (optional)</label>
                <input type="text" id="location" name="location" value="{{ item.location }}">
            </div>

            <div class="form-row">
                <label for="notes">Notes (optional)</label>
                <textarea id="notes" name="notes">{{ item.notes }}</textarea>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn-primary">
                    <i class="fas fa-save"></i> Update Item
                </button>
                <a href="{% url 'inventory_view' %}" class="back-link">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
