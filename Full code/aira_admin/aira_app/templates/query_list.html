<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Query Management - AIRA Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #f0f8ff; /* Light blue background */
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 0;
            margin-bottom: 40px;
            border-bottom: 1px solid #d1e8ff;
        }
        
        .logo {
            display: flex;
            align-items: center;
        }
        
        .logo-icon {
            font-size: 3rem;
            margin-right: 15px;
            background: linear-gradient(45deg, #4a90e2, #87ceeb);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 5px 15px rgba(74, 144, 226, 0.3);
        }
        
        .logo h1 {
            color: #2c3e50; /* Dark blue-gray */
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: 2px;
        }
        
        .logo p {
            color: #7f8c8d; /* Gray */
            font-size: 1.1rem;
            margin-left: 15px;
            padding-left: 15px;
            border-left: 1px solid #d1e8ff;
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(173, 216, 230, 0.3);
            border: 1px solid #e1f5fe;
        }
        
        .page-header h2 {
            color: #2c3e50;
            font-size: 2.2rem;
            font-weight: 600;
        }
        
        .header-actions {
            display: flex;
            gap: 15px;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 30px;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(173, 216, 230, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary {
            background: linear-gradient(45deg, #4a90e2, #87ceeb);
        }
        
        .btn-secondary {
            background: linear-gradient(45deg, #36a2db, #5dc9f4);
            box-shadow: 0 5px 15px rgba(54, 162, 219, 0.3);
        }
        
        .btn-danger {
            background: linear-gradient(45deg, #e74c3c, #ff6b6b);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3);
            padding: 8px 16px;
            font-size: 0.9rem;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(74, 144, 226, 0.4);
        }
        
        .btn-secondary:hover {
            box-shadow: 0 8px 20px rgba(54, 162, 219, 0.4);
        }
        
        .btn-danger:hover {
            box-shadow: 0 8px 20px rgba(231, 76, 60, 0.4);
        }
        
        .btn:active {
            transform: translateY(1px);
        }
        
        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        
        .btn:hover::after {
            left: 100%;
        }
        
        .table-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(173, 216, 230, 0.3);
            border: 1px solid #e1f5fe;
            overflow: hidden;
            margin-bottom: 40px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            color: #2c3e50;
        }
        
        th {
            background: #f8fbff;
            padding: 20px 15px;
            text-align: left;
            font-weight: 600;
            font-size: 1.1rem;
            border-bottom: 1px solid #e1f5fe;
            color: #2c3e50;
        }
        
        td {
            padding: 18px 15px;
            border-bottom: 1px solid #f0f8ff;
        }
        
        tr:last-child td {
            border-bottom: none;
        }
        
        tr:hover {
            background: #f8fbff;
        }
        
        .query-cell {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .response-cell {
            max-width: 400px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .actions-cell {
            width: 200px;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        
        .edit-btn {
            color: #4a90e2;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
        }
        
        .edit-btn:hover {
            color: #2c3e50;
            transform: translateX(3px);
        }
        
        .delete-btn {
            color: #e74c3c;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
        }
        
        .delete-btn:hover {
            color: #c0392b;
            transform: translateX(3px);
        }
        
        .edit-btn i, .delete-btn i {
            margin-right: 5px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #7f8c8d;
        }
        
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
            color: #b0c4de;
        }
        
        .empty-state p {
            font-size: 1.2rem;
        }
        
        .ai-orb {
            position: fixed;
            bottom: -100px;
            right: -100px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(74, 144, 226, 0.15) 0%, rgba(74, 144, 226, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            animation: pulse 4s infinite alternate;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.3; }
            100% { transform: scale(1.1); opacity: 0.5; }
        }
        
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        
        .particle {
            position: absolute;
            background: rgba(135, 206, 235, 0.3); /* Light blue particles */
            border-radius: 50%;
            animation: float 15s infinite linear;
        }
        
        @keyframes float {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) translateX(100px); opacity: 0; }
        }
        
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                text-align: center;
            }
            
            .logo {
                flex-direction: column;
                margin-bottom: 20px;
            }
            
            .logo p {
                margin-left: 0;
                padding-left: 0;
                border-left: none;
                border-top: 1px solid #d1e8ff;
                padding-top: 10px;
                margin-top: 10px;
            }
            
            .page-header {
                flex-direction: column;
                text-align: center;
                gap: 20px;
            }
            
            .header-actions {
                flex-direction: column;
                width: 100%;
            }
            
            .btn {
                width: 100%;
                text-align: center;
            }
            
            .table-container {
                overflow-x: auto;
            }
            
            table {
                min-width: 600px;
            }
            
            .query-cell, .response-cell {
                max-width: 200px;
            }
            
            .action-buttons {
                flex-direction: column;
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="ai-orb"></div>
    
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-robot"></i>
                </div>
                <div>
                    <h1>AIRA</h1>
                    <p>AI College Assistant - Admin Dashboard</p>
                </div>
            </div>
        </header>
        
        <div class="page-header">
            <h2>Query Management</h2>
            <div class="header-actions">
                <a href="{% url 'home' %}" class="btn btn-secondary">
                    <i class="fas fa-home"></i> Back to Home
                </a>
                <a href="{% url 'add_query' %}" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Add New Query
                </a>
                <a href="{% url 'inventory_view' %}" class="btn btn-secondary">
                    <i class="fas fa-image"></i> Inventory
                </a>
            </div>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Query</th>
                        <th>Response</th>
                        <th class="actions-cell">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for q in queries %}
                    <tr>
                        <td>{{ q.id }}</td>
                        <td class="query-cell">{{ q.query }}</td>
                        <td class="response-cell">{{ q.response }}</td>
                        <td class="actions-cell">
                            <div class="action-buttons">
                                <a href="{% url 'edit_query' q.id %}" class="edit-btn">
                                    <i class="fas fa-edit"></i> Edit
                                </a>
                                <a href="#" class="delete-btn" onclick="deleteQuery({{ q.id }})">
                                    <i class="fas fa-trash"></i> Delete
                                </a>
                            </div>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="4">
                            <div class="empty-state">
                                <i class="fas fa-inbox"></i>
                                <p>No queries added yet.</p>
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Create floating particles for background effect
        document.addEventListener('DOMContentLoaded', function() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 40;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // Random size between 2px and 6px
                const size = Math.random() * 4 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                
                // Random position
                particle.style.left = `${Math.random() * 100}%`;
                
                // Random animation duration between 10s and 20s
                const duration = Math.random() * 10 + 15;
                particle.style.animationDuration = `${duration}s`;
                
                // Random delay
                particle.style.animationDelay = `${Math.random() * 5}s`;
                
                particlesContainer.appendChild(particle);
            }
        });
        function deleteQuery(queryId) {
            Swal.fire({
                title: 'Are you sure?',
                text: "You won't be able to revert this!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#e74c3c',
                cancelButtonColor: '#4a90e2',
                confirmButtonText: 'Yes, delete it!',
                cancelButtonText: 'Cancel'
            }).then((result) => {
                if (result.isConfirmed) {
                    // Redirect to Django delete URL
                    window.location.href = `/delete_query/${queryId}/`;  // replace with your actual URL pattern
                }
            })
        }
    </script>
</body>
</html>
