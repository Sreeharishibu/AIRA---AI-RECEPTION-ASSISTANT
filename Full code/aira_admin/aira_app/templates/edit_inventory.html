{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Inventory Item - AIRA</title>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* same as add_inventory for brevity */
        body {
            background-color: #f0f8ff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .page-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(173,216,230,0.3);
            border: 1px solid #e1f5fe;
            margin-top: 30px;
        }
        h2 { color: #2c3e50; margin-bottom: 15px; }
        .form-row { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; color: #2c3e50; }
        input[type="text"], input[type="number"], select, textarea {
            width: 95%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #d1e8ff;
            font-size: 0.95rem;
        }
        textarea { min-height: 80px; }
        .btn-primary {
            display: inline-block;
            padding: 10px 22px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(45deg, #4a90e2, #87ceeb);
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .back-link {
            margin-left: 10px;
            text-decoration: none;
            font-size: 0.95rem;
            color: #4a90e2;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="page-card">
        <h2>Edit Inventory Item</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="form-row">
                <label for="name">Item Name</label>
                <input type="text" id="name" name="name" value="{{ item.name }}" required>
            </div>
            <div class="form-row">
                <label for="category">Category</label>
                <select id="category" name="category">
                    <option value="STATIONERY" {% if item.category == "STATIONERY" %}selected{% endif %}>Stationery</option>
                    <option value="ELECTRONICS" {% if item.category == "ELECTRONICS" %}selected{% endif %}>Electronics</option>
                    <option value="LAB" {% if item.category == "LAB" %}selected{% endif %}>Lab Equipment</option>
                    <option value="FURNITURE" {% if item.category == "FURNITURE" %}selected{% endif %}>Furniture</option>
                    <option value="OTHER" {% if item.category == "OTHER" %}selected{% endif %}>Other</option>
                </select>
            </div>
            <div class="form-row">
                <label for="quantity">Quantity</label>
                <input type="number" id="quantity" name="quantity" min="0"
                       value="{{ item.quantity }}">
            </div>
            <div class="form-row">
                <label for="location">Location (optional)</label>
                <input type="text" id="location" name="location" value="{{ item.location }}">
            </div>
            <div class="form-row">
                <label for="notes">Notes (optional)</label>
                <textarea id="notes" name="notes">{{ item.notes }}</textarea>
            </div>
            <button type="submit" class="btn-primary">
                <i class="fas fa-save"></i> Update Item
            </button>
            <a href="{% url 'inventory_view' %}" class="back-link">
                Cancel
            </a>
        </form>
    </div>
</div>
</body>
</html>
